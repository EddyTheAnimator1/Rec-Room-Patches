name: Build and Stage Release

on:
  push:
    branches:
      - main
      - master
    paths:
      - Release.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Calculate next release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            next_tag="v0.0.1"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<< "$version"
            major="${major:-0}"
            minor="${minor:-0}"
            patch="${patch:-0}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "release_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "release_version=${next_tag#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp version into Release.py
        shell: python
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.release_version }}
        run: |
          import os
          import pathlib
          import re
          import sys

          path = pathlib.Path("Release.py")
          text = path.read_text(encoding="utf-8")
          version = os.environ["RELEASE_VERSION"]
          updated, count = re.subn(
              r'(?m)^APP_VERSION\s*=\s*["\'][^"\']+["\']',
              f'APP_VERSION = "{version}"',
              text,
              count=1,
          )

          if count != 1:
            print("APP_VERSION line was not found exactly once in Release.py", file=sys.stderr)
            raise SystemExit(1)

          path.write_text(updated, encoding="utf-8")
          print(f"Stamped APP_VERSION = {version}")

      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build Release.exe
        run: python -m PyInstaller --noconfirm --clean --onefile --name Release Release.py

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: Release-${{ steps.version.outputs.release_tag }}
          path: dist/Release.exe
          if-no-files-found: error

      - name: Create draft GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail
          gh release create "$RELEASE_TAG" dist/Release.exe \
            --draft \
            --title "$RELEASE_TAG" \
            --notes "Edit this draft and describe what you added, removed, and changed."
