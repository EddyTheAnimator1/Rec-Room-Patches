name: Build and stage Release.exe

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'Release.py'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-stage:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          if (Test-Path requirements.txt) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Verify Release.py exists
        shell: pwsh
        run: |
          if (-not (Test-Path Release.py)) {
            throw 'Release.py was not found at the repository root.'
          }

      - name: Build Release.exe
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --name Release Release.py

      - name: Prepare uploaded files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Copy-Item dist/Release.exe release/Release.exe

      - name: Upload EXE artifact
        id: upload_artifact
        uses: actions/upload-artifact@v6
        with:
          name: Release-exe-${{ github.run_number }}
          path: release/Release.exe
          retention-days: 14
          compression-level: 0

      - name: Compute next patch version
        id: next_version
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $json = gh api "repos/${env:GITHUB_REPOSITORY}/releases?per_page=100"
          $releases = $json | ConvertFrom-Json
          $versions = @()

          foreach ($rel in $releases) {
            $tag = [string]$rel.tag_name
            if ($tag -match '^v?(\d+)\.(\d+)\.(\d+)$') {
              $versions += [pscustomobject]@{
                Major = [int]$Matches[1]
                Minor = [int]$Matches[2]
                Patch = [int]$Matches[3]
              }
            }
          }

          if ($versions.Count -eq 0) {
            $nextTag = 'v0.0.1'
          }
          else {
            $latest = $versions | Sort-Object Major, Minor, Patch | Select-Object -Last 1
            $nextTag = "v$($latest.Major).$($latest.Minor).$([int]$latest.Patch + 1)"
          }

          "tag=$nextTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create draft release notes
        shell: pwsh
        run: |
          @"
          Describe what changed here before publishing.

          Added:
          - 

          Removed:
          - 

          Changed:
          - 
          "@ | Out-File -FilePath release-notes.md -Encoding utf8

      - name: Create draft release
        id: create_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEXT_TAG: ${{ steps.next_version.outputs.tag }}
        run: |
          gh release create $env:NEXT_TAG "release/Release.exe#Release.exe" `
            --title $env:NEXT_TAG `
            --draft `
            --notes-file release-notes.md

          $draftUrl = gh release view $env:NEXT_TAG --json url --jq .url
          "url=$draftUrl" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Write summary
        shell: pwsh
        run: |
          @"
          ## Build ready

          Version: `${{ steps.next_version.outputs.tag }}`

          Artifact:
          ${{ steps.upload_artifact.outputs.artifact-url }}

          Draft release:
          ${{ steps.create_release.outputs.url }}

          Open the draft release, write what you added, removed, and changed, then click **Publish release**.
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append
