$exe = "D:\a\_temp\rr-patch-work\5937396277352677720\download\Recroom_Release.exe"
$exeDir = Split-Path $exe -Parent
$dataLog = Join-Path $exeDir "Recroom_Release_Data\output_log.txt"

Write-Host "Launching: $exe"
$p = Start-Process -FilePath $exe -WorkingDirectory $exeDir -PassThru

Start-Sleep -Seconds 20

if (-not $p.HasExited) {
    Write-Host "Process still running, stopping it..."
    Stop-Process -Id $p.Id -Force
    $p.WaitForExit()
}

Write-Host "Exit code: $($p.ExitCode)"

Write-Host "`nChecking sibling Data log..."
if (Test-Path $dataLog) {
    Write-Host "Found Data log: $dataLog"
    Get-Content $dataLog -Tail 200
} else {
    Write-Host "Data log not found."
}

Write-Host "`nSearching LocalLow for output_log.txt..."
$localLowLogs = Get-ChildItem "$env:USERPROFILE\AppData\LocalLow" -Recurse -Filter output_log.txt -ErrorAction SilentlyContinue |
    Sort-Object LastWriteTime -Descending

if ($localLowLogs) {
    $latest = $localLowLogs[0].FullName
    Write-Host "Found LocalLow log: $latest"
    Get-Content $latest -Tail 200
} else {
    Write-Host "No LocalLow output_log.txt found."
}

Write-Host "`nCrash dump check..."
Get-ChildItem "$env:LOCALAPPDATA\CrashDumps" -ErrorAction SilentlyContinue | Sort-Object LastWriteTime -Descending | Select-Object -First 10 FullName, LastWriteTime